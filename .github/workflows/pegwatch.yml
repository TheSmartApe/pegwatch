name: PegWatch

# Fait tourner l'agent 2x/jour (ouverture + clôture de Wall St, en semaine) et
# commit le snapshot. Le cœur est keyless : aucun secret nécessaire.
on:
  schedule:
    - cron: '30 13 * * 1-5'   # 13:30 UTC = 09:30 ET (ouverture)
    - cron: '0 20 * * 1-5'    # 20:00 UTC = 16:00 ET (clôture)
  workflow_dispatch: {}        # déclenchement manuel

permissions:
  contents: write              # pour committer le snapshot

concurrency:
  group: pegwatch-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run PegWatch (focus)
        # le repo EST le package `pegwatch/` ; on lance depuis le dossier parent.
        # mode focus (14 noms liquides) = robuste pour le dataset de dérive quotidien.
        run: |
          cd ..
          python -m pegwatch.agent

      - name: Commit snapshot
        run: |
          git config user.name "pegwatch-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          if git diff --cached --quiet; then
            echo "aucun changement"
          else
            git commit -m "pegwatch run ${{ github.run_id }} ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
