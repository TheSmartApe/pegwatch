name: netcheck
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: probe endpoints
        run: |
          probe() { echo "=== $1 (UA=$3) ==="; curl -s -o /dev/null -w "  http=%{http_code} time=%{time_total}s\n" --max-time 15 -A "$2" "$1" || echo "  FAILED/timeout"; }
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
          probe "https://api.xstocks.fi/api/v2/public/assets?page=0" "curl/8" "default"
          probe "https://api.xstocks.fi/api/v2/public/assets?page=0" "$UA" "browser"
          probe "https://api.xstocks.fi/api/v2/public/assets/TSLAx/price-data" "$UA" "browser"
          probe "https://coins.llama.fi/prices/current/mantle:0x8ad3c73f833d3f9a523ab01476625f269aeb7cf0" "$UA" "browser"
          probe "https://api.llama.fi/v2/chains" "$UA" "browser"
          probe "https://finnhub.io/api/v1/quote?symbol=AAPL&token=demo" "$UA" "browser"
          probe "https://rpc.mantle.xyz" "$UA" "browser"
          probe "https://mainnet.base.org" "$UA" "browser"
